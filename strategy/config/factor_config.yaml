  entry_speed: 0.8
  exit_speed: 1.0
  position_stop_loss: 0.07
  portfolio_stop_loss: 0.12
  max_single_weight: 0.12
  dynamic_min_positions:
    bull: 2
    neutral: 1
    bear: 0
  selection:
    min_rank_pct: 0.40
    min_absolute_score: 0.10   # 龙头洁癖: 绝对质量门槛, 0=禁用
    min_confidence: 0.30
  fv_exposure_params:
    fv_low: -0.01
    fv_high: 0.02
    exposure_min: 0.4
    exposure_max: 1.0
  turnover_bonus: 0.05
portfolio_stop_loss:
  enabled: true
  emergency_exposure: 0.3
volatility_control:
  enabled: true
  lookback_period: 20          # 短期波动率窗口
  long_lookback_period: 60    # 长期波动率窗口（市场风格切换参考）
  blend_weight: 0.6          # 短期权重（长期=1-blend_weight）
factor_neutralization:
  enabled: true
  neutralize_industry: false  # 关闭行业中性化，保留行业轮动alpha
  neutralize_market_cap: true
  min_samples_per_industry: 3
enhanced_stop_loss:
  time_stop_days: 15
  time_stop_min_return: -0.03
  trailing_stop_pct: 0.08
  trailing_stop_enabled: true
  volatility_adaptive_mult: 1.5
risk_parity:
  enabled: false
  target_risk_per_stock: 0.1
  max_iterations: 50
dynamic_rebalance:
  enabled: true
  bull_period: 15
  neutral_period: 20
  bear_period: 20
chan_theory:
  enabled: true
  divergence:
    enabled: true
    lookback: 20
    peak_trough_lookback: 5
    strength_threshold: 0.3      # 背离强度阈值（可配置）
    bottom_div_threshold: 0.3   # 底背离触发阈值（越高越严格）
    top_div_threshold: 0.3      # 顶背离触发阈值
    verify_trend: true
  structure:
    enabled: true
    pivot_min_overlap: 3
    pivot_zone_buffer: 0.02
    min_trend_bars: 8
    zhongyin_threshold: 0.02
  signal_boost:
    bottom_divergence_mult: 1.25
    top_divergence_mult: 0.7
    alignment_boost: 0.1
    zhongyin_penalty: 0.85
    pivot_breakout_buy_mult: 1.15
    pivot_breakout_sell_mult: 0.75
  exit:
    top_divergence_exit: 0.30
    trend_exhaustion_exit: -0.30
    buy_zone_stop_protection: 1.5
    volume_divergence_exit: true
  # === 缠论止盈配置 ===
  take_profit:
    enabled: true                   # 启用缠论分层止盈
    s1_reduce_pct: 1.0             # S1一卖→全清(1.0=清仓, 0.5=减半)
    s2_reduce_pct: 0.5             # S2二卖→减半仓
    s3_reduce_pct: 1.0             # S3三卖→全清
    pivot_trailing_enabled: true   # 中枢移动止盈
    profit_lock_pct: 0.15          # 盈利>15%启动移动止盈
    bi_sell_exit: true             # 笔级卖点也参与退出
# === 缠论增强配置 (czsc风格): 分型→笔→线段→中枢→买卖点 ===
chan_theory_enhanced:
  enabled: true
  # 笔检测参数
  stroke:
    min_stroke_bars: 4         # 顶底分型之间最少K线数
  # 线段检测参数
  segment:
    min_strokes: 3             # 构成线段的最少笔数
  # 中枢检测参数
  pivot:
    min_segments: 3            # 构成中枢的最少线段数
    overlap_required: true     # 是否要求严格重叠
  # 买卖点权重
  buy_sell_points:
    b1_buy_mult: 1.30          # 一买增强乘数
    b2_buy_mult: 1.20          # 二买增强乘数
    b3_buy_mult: 1.25          # 三买增强乘数
    s1_sell_mult: 0.60         # 一卖削弱乘数
    s2_sell_mult: 0.65         # 二卖削弱乘数
    s3_sell_mult: 0.70         # 三卖削弱乘数
  # 信号综合权重
  signal:
    trend_trend_follow: 1.08   # 顺势加成
    trend_counter_trend: 0.92  # 逆势折扣
    consolidation_discount: 0.7 # 盘整信号折扣
    zhongyin_penalty: 0.85     # 中阴状态惩罚
    pivot_bottom_boost: 1.10   # 中枢下方买入加成
stock_pool:
  enabled: false
  size: 800
  source: 复合评分Top800(流动性60%+稳定性25%+活跃度15%, 已排雷:次新/ST/科创/僵尸/低流动)
ml:
  enabled: false
  blend_weight: 0.3
  retrain_frequency: 20
  n_estimators: 200
  max_depth: 4
  learning_rate: 0.05
  subsample: 0.7
  colsample_bytree: 0.6
  reg_lambda: 2.0
  reg_alpha: 1.0
  min_child_weight: 5
  use_cross_features: true
  use_regime_features: true
backtest:
  cash: 150000.0
  commission: 0.00011
  slippage: 0.0001
  rebalance_days: 20
  num_workers: 4
