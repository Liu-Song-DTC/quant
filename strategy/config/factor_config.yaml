# ==================== LLM 行业情绪分析 ====================
industry_sentiment:
  enabled: true
  data_dir: "data/sentiment_data"
  deepseek_api_key: ""
  analysis_frequency: "daily"
  max_news_batch: 50
  notify_on_completion: true
  weight_impact:
    enabled: true
    max_multiplier: 1.20
    min_multiplier: 0.80
    smoothing_days: 3
    regime_adjustment: true
  backtest:
    precomputed_file: ""

indicator_params:
  ema_periods:
  - 5
  - 10
  - 20
  - 60
  ma_periods:
  - 5
  - 10
  - 20
  - 30
  - 60
  rsi_periods:
  - 6
  - 8
  - 10
  - 14
  bb_window: 20
  bb_std: 2
  momentum_periods:
  - 3
  - 5
  - 10
  - 20
  - 30
  volatility_periods:
  - 5
  - 10
  - 20
  atr_periods:
  - 10
  - 14
  - 20
  volume_ma_period: 20
signal:
  buy_threshold: 0.5
  sell_threshold: -0.15
regime_multiplier:
  bull: 1.0
  neutral: 0.9
  bear: 0.25
portfolio:
  target_volatility: 0.25
  entry_speed: 1.0
  exit_speed: 1.0
  position_stop_loss: 0.30
  portfolio_stop_loss: 0.25
  max_single_weight: 0.30
  fv_exposure_params:
    fv_low: -0.01
    fv_high: 0.02
    exposure_min: 0.6
    exposure_max: 1.0
  turnover_bonus: 0.05
portfolio_stop_loss:
  enabled: true
  emergency_exposure: 0.6
volatility_control:
  enabled: true
  lookback_period: 20
# === 因子中性化 ===
factor_neutralization:
  enabled: false
  neutralize_industry: true
  neutralize_market_cap: true
  min_samples_per_industry: 3
# === 增强止损 ===
enhanced_stop_loss:
  time_stop_days: 250
  time_stop_min_return: -0.10
  trailing_stop_pct: 0.35
  trailing_stop_enabled: false
  volatility_adaptive_mult: 1.5
# === 风险平价 ===
risk_parity:
  enabled: true
  target_risk_per_stock: 0.10
  max_iterations: 50
backtest:
  cash: 100000.0
  commission: 0.0015
  slippage: 0.0015
  rebalance_days: 20
