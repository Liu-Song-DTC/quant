# 因子配置 - 用于量化交易策略的因子权重管理
# 当前使用默认值，与原有代码保持一致

# 技术面因子权重 (默认) - 平衡版
# 提高RSI权重: 0.25 → 0.30 (超买超卖更适合牛市)
# 保持动量权重: 0.30
technical_weights:
  volatility_10: 0.20
  rsi_average: 0.30
  bb_width: 0.20
  momentum: 0.30

# 信号阈值
signal_thresholds:
  buy: 0.15        # 默认买入阈值
  adjusted_buy: 0.05
  sell: -0.05

# 极端状态调整 (默认) - 与原代码保持一致
extreme_adjustments:
  regime_weight: 0.85

# 基本面因子权重 (新增)
fundamental_weights:
  enabled: true
  weight: 0.30  # 基本面权重30%，技术面70%
  technical_weight: 0.70

# 市场状态动态权重
regime_weights:
  bull:
    volatility_10: 0.20
    rsi_average: 0.20
    bb_width: 0.10
    momentum: 0.50
  bear:
    volatility_10: 0.40
    rsi_average: 0.30
    bb_width: 0.10
    momentum: 0.20
  neutral:
    volatility_10: 0.30
    rsi_average: 0.25
    bb_width: 0.15
    momentum: 0.30

# 波动率控制 (新增)
volatility_control:
  enabled: true
  target_volatility: 0.20
  lookback_period: 20

# 组合止损 (新增)
portfolio_stop_loss:
  enabled: true
  drawdown_threshold: 0.08  # 从高点回撤8%触发
  emergency_exposure: 0.30  # 触发后仓位上限

# 风格因子权重 (新增) - 用于大小盘/价值成长轮动
style_weights:
  enabled: true
  weight: 0.25  # 风格因子权重提升到25%
  # 风格轮动参数
  style_rotation:
    small_cap_threshold: 0.03  # 小盘偏好阈值
    large_cap_threshold: -0.03  # 大盘偏好阈值
    confidence_threshold: 0.3  # 风格置信度阈值
    momentum_boost: 1.5  # 牛市风格动量增强系数
