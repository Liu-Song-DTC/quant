industry_sentiment:
  enabled: false  # 回测期仅有2026-05-14一天数据, 引入前视偏差
  data_dir: data/sentiment_data
  deepseek_api_key: ${DEEPSEEK_API_KEY}
  analysis_frequency: daily
  max_news_batch: 50
  notify_on_completion: true
  weight_impact:
    enabled: true
    max_multiplier: 1.1
    min_multiplier: 0.9
    smoothing_halflife: 5
    smoothing_method: ema
    regime_adjustment: true
    negativity_bias: 1.2
  backtest:
    precomputed_file: ''
indicator_params:
  ema_periods:
  - 5
  - 10
  - 20
  - 60
  ma_periods:
  - 5
  - 10
  - 20
  - 30
  - 60
  rsi_periods:
  - 6
  - 8
  - 10
  - 14
  bb_window: 20
  bb_std: 2
  momentum_periods:
  - 3
  - 5
  - 10
  - 20
  - 30
  volatility_periods:
  - 5
  - 10
  - 20
  atr_periods:
  - 10
  - 14
  - 20
  volume_ma_period: 20
signal:
  buy_threshold: 0.02       # 纯因子评分(mean=-0.17), p90≈0.03
  sell_threshold: -0.35
  buy_threshold_pct: 0.4
  buy_threshold_pct_bull: 0.25
  buy_threshold_pct_bear: 0.5
  composite_bias: 0.0
  resonance:
    sys1_buy_threshold_mult: 0.7
    sys2_cf_score_threshold: 0.5
    sys3_ns_score_threshold: 0.3
    sys2_cf_sell_threshold: 0.35
    sys3_ns_sell_threshold: 0.2
  factor_quality_gate:
    enabled: true
    banned_suffixes:
    - _T
    - _SM
    restricted_suffixes:
      _FBA: 1.3
      _FV: 1.3
      _F: 1.3
    premium_suffixes:
      _FLA: 1.0
      _FGR: 1.0
      _FGRV: 1.0
      _FLAV: 1.0
      _FSM: 1.0
      _FD: 1.0
      _LA: 1.0
  ti_boost_scale: 2.0
  ti_boost_magnitude: 0.12
  ti_adaptive_scale: 0.3
  ti_adaptive_max_adjust: 0.12
  signal_confidence_baseline: 0.2
  trend_sell_threshold_strong: -0.18
  trend_sell_threshold_weak: -0.13
  trend_sell_ti_threshold: 0.05
  trend_sell_ti_relax: -0.25
regime_multiplier:
  bull: 1.0
  neutral: 0.95
  bear: 0.9
portfolio:
  target_volatility: 0.25
  entry_speed: 0.8
  exit_speed: 0.8
  position_stop_loss: 0.12  # 默认值, 被 portfolio_stop_loss_by_regime 覆盖
  portfolio_stop_loss: 0.12
  portfolio_stop_loss_by_regime:  # Layer3: 止损线随市场收紧
    bull: 0.10
    neutral: 0.08
    bear: 0.05    # 熊市止损更紧
  dynamic_min_positions:
    bull: 3
    neutral: 2
    bear: 1
  selection:
    min_rank_pct: 0.5
    min_absolute_score: 0.05  # 默认值, 被 min_absolute_score_by_regime 覆盖
    min_absolute_score_by_regime:  # Layer1: 信号质量门槛随市场浮动 (适配纯因子评分范围)
      bull: -0.05      # 牛市: 低门槛
      neutral: 0.0     # 震荡: 中等门槛
      bear: 0.02       # 熊市: 高门槛
    min_confidence: 0.7
    chan_gate_enabled: true
    chan_gate_min_count: 2
    chan_fallback_score: 0.4
    exhaustion_max_weight: 0.08
    exhaustion_reduce_mult: 0.5
    industry_max_weight: 0.4
    max_per_industry: 2   # ExpB2: 同行业最多2只, 防止过度集中
    rank_weight_cap: 0.35
    speculative_max_weight: 0.4
  fv_exposure_params:
    fv_low: -0.02
    fv_high: 0.03
    exposure_min: 0.25
    exposure_max: 1.0
  turnover_bonus: 0.1
  params:
    max_positions: 5  # 默认值, 被 max_positions_by_regime 覆盖
    max_positions_by_regime:  # Layer2: 最大持仓随市场浮动
      strong_bull: 8
      bull: 6
      neutral: 4
      bear: 2            # 熊市最多2只, 允许0只(空仓)
    risk_parity_min_weight_ratio: 0.4
    rank_decay: 0.3
    bull_market_floor: 0.85
    bull_market_ceiling: 1.0
    bear_market_floor: 0.3
    bear_market_ceiling: 0.5
    chan_bonus_sl2: 0.04
    chan_bonus_buy_point: 0.02
    chan_bonus_trend2: 0.01
    mom_60d_fomo_threshold: 0.3
    mom_60d_fomo_mult: 0.3
    mom_60d_warn_threshold: 0.2
    mom_60d_warn_mult: 0.65
    dist_ma60_extended_threshold: 0.3
    dist_ma60_extended_mult: 0.4
    isolated_b3_penalty: -0.08
    b3_vol_severe_penalty: -0.06
    exhaustion_high_threshold: 0.3
    exhaustion_moderate_threshold: 0.15
    mr_exit_cooldown_days: 14
    ideal_position_max_mult: 2.0
    min_hold_days: 10  # 15→10: 与rebalance_days对齐, 避免想换仓但换不了的配置冲突
    sector_momentum_weight: 0.4
    sector_signal_density_weight: 0.6
portfolio_stop_loss:
  enabled: true
  emergency_exposure: 0.0        # 触发后直接清仓，不留敞口
  recovery_days: 10              # 恢复冷却期: 10天线性恢复, 避免离场过久
  stop_refill: false             # 止损触发期间禁止补票, 防止换股→再止损的滚雪球
hard_drawdown_stop:
  enabled: true                  # 启用: 20%回撤全清仓, 防止40%+极端回撤
consecutive_loss_breaker:
  enabled: true                  # 启用: 连续亏损周期→减半敞口, 打破连亏螺旋
volatility_control:
  enabled: true
  lookback_period: 20
  long_lookback_period: 60
  blend_weight: 0.6
factor_neutralization:
  enabled: true
  neutralize_industry: true
  neutralize_market_cap: true
  min_samples_per_industry: 3
enhanced_stop_loss:
  time_stop_days: 15
  time_stop_min_return: -0.03
  trailing_stop_enabled: true
  volatility_adaptive_mult: 0.5       # 从1.0降到0.5: 缩小自适应放宽幅度, 上限约1.5x
  max_adaptive_stop_mult: 1.5         # 自适应止损上限从2.0x→1.5x: 高波动股最多放宽到18%
  # 分级移动止盈: 盈利越高, 回撤容忍越紧
  tiered_trailing_stop:
    0.15: 0.10    # 盈利>15%: 从峰值回撤>10%止盈
    0.30: 0.07    # 盈利>30%: 从峰值回撤>7%止盈
    0.50: 0.04    # 盈利>50%: 从峰值回撤>4%止盈
  # 死钱退出: 持仓过久但无收益
  dead_money_exit_days: 30
  dead_money_return_band: 0.02  # 持有>30天 |收益|<2% 则退出
  time_stop_by_buy_point:
    1:
    - 40
    - -0.08
    2:
    - 30
    - -0.05
    3:
    - 20
    - -0.05
  trailing_stop_by_buy_point:
    1: 0.15
    2: 0.12
    3: 0.1
    default: 0.08
mean_reversion_exit:
  mom_60d_force_exit: 0.45
  dist_ma60_force_exit: 0.4
  mom_60d_reduce: 0.3
  dist_ma60_reduce: 0.35
  reduce_pct: 0.3
risk_parity:
  enabled: true
  target_risk_per_stock: 0.1
  max_iterations: 50
dynamic_rebalance:
  enabled: true
  bull_period: 30
  neutral_period: 20
  bear_period: 15
chan_theory:
  enabled: true
  divergence:
    enabled: true
    lookback: 20
    peak_trough_lookback: 5
    strength_threshold: 0.3
    bottom_div_threshold: 0.3
    top_div_threshold: 0.3
    verify_trend: true
  structure:
    enabled: true
    pivot_min_overlap: 3
    pivot_zone_buffer: 0.02
    min_trend_bars: 8
    zhongyin_threshold: 0.02
  signal_boost:
    bottom_divergence_mult: 1.15
    top_divergence_mult: 0.78
    alignment_boost: 0.06
    zhongyin_penalty: 0.9
    pivot_breakout_buy_mult: 1.08
    pivot_breakout_sell_mult: 0.82
  exit:
    top_divergence_exit: 0.3
    trend_exhaustion_exit: -0.3
    buy_zone_stop_protection: 1.5
    volume_divergence_exit: true
  take_profit:
    enabled: true
    s1_reduce_pct: 0.75
    s2_reduce_pct: 0.5
    s3_reduce_pct: 1.0
    pivot_trailing_enabled: true
    profit_lock_pct: 0.2
    bi_sell_exit: true
chan_theory_enhanced:
  enabled: true
  stroke:
    min_stroke_bars: 4
  segment:
    min_strokes: 3
  pivot:
    min_segments: 3
    overlap_required: true
  buy_sell_points:
    b1_buy_mult: 1.2
    b2_buy_mult: 1.12
    b3_buy_mult: 1.15
    s1_sell_mult: 0.75
    s2_sell_mult: 0.78
    s3_sell_mult: 0.82
  signal:
    trend_trend_follow: 1.06
    trend_counter_trend: 0.94
    consolidation_discount: 0.8
    zhongyin_penalty: 0.9
    pivot_bottom_boost: 1.06
  b1_gate:
    min_bottom_div: 0.15
    min_fx_vol_spike: 1.5
    enabled: true
    min_signal_level: 2  # B1 SL=0 WR=40% MR=-1.07%, SL>=2 WR=50.8% MR=1.35%
  b2_gate:
    min_div_strength: 0.0  # 关闭B2 gate测试: Exp D2显示0.03降Sharpe 1.30→1.25
  b3_filter:
    enabled: false  # 关闭: 多实验证实B3 gate摧毁Sharpe, 数据驱动条件仍需改进
  b4_gate:
    enabled: true  # P3收紧: SL>=3 (SL=2 WR=53%拖累, SL>=3 WR=63% MR=2.34%)
    min_signal_level: 3  # SL>=3: 过滤47.8%的B4 SL=2信号(WR仅53%)
    min_confidence: 0.20  # 宽松(chan B4 confidence min=0.20)
  bp7_gate:
    enabled: true  # BP7质量最高(WR=55.6%)但SL=0占17%(WR=42%/MR=-1.19%)未过滤
    min_signal_level: 2  # SL>=2 (SL>=2 WR=57.8%/MR=2.43%)
  bp6_gate:
    enabled: true  # BP6均线回踩, 占10.7%信号, WR=49.6%低于平均
    min_signal_level: 2  # SL>=2: 收紧, SL=1的BP6没有胜率验证数据
    min_trend_type: 0    # TT>=0: 只在盘整或上涨时允许均线回踩
  bp5_gate:
    enabled: true  # B5趋势启动, SL>=2: 需要清晰结构确认
    min_signal_level: 2
  bp8_gate:
