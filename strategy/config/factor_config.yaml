factor_mode: both
dynamic_factor:
  train_window_days: 180
  forward_period: 20
  top_n_factors: 5
  min_train_samples: 50
  min_ic_dates: 5
  ic_decay_factor: 0.90
  fallback_to_static: true
  min_factor_count: 2
  min_factor_families: 2
  min_ic_1f: 0.04
  use_static_candidates: true
  reweight_blend: 0.5
  date_sample_step: 5
  extra_candidate_factors:
    - smart_money_flow
    - relative_strength
    - rsi_vol_combo
    - wash_sale_score
    - low_downside
    - vol_confirm
# === 核心因子（3个）===
# 2026-05-09 单因子IC分析收敛：15→3，聚焦真正有预测力的因子
# 选择原则：ICIR>0.28 + 家族分散 + 低相关性(r<0.5)
# 组合: fund_score + volatility + mom_x_lowvol_20_20
#   组合IC=0.0832, 组合ICIR=0.545, 组合胜率=71.8%
backtest_factors:
  # 基本面（1个）
  - fund_score           # IC=0.0578, ICIR=0.381, 胜率=64.6%, 家族:value

  # 低波动（1个）
  - volatility           # IC=0.0615, ICIR=0.313, 胜率=61.1%, 家族:lowvol

  # 动量×低波（1个）- 与上面两者低相关，提供独立信号
  - mom_x_lowvol_20_20   # IC=0.0498, ICIR=0.281, 胜率=62.7%

# === 备选因子池（当核心因子IC衰减时替换）===
# 排序依据: ICIR从高到低
static_candidate_factors:
  # 强但冗余（与fund_score r=0.778）
  - fund_profit_growth   # IC=0.0541, ICIR=0.366 (备用: fund_score替代)
  - fund_roe             # IC=0.0554, ICIR=0.292 (IC近期衰减中)

  # 弱因子（仅作极端备用）
  - trend_lowvol         # IC=0.0263, ICIR=0.131
