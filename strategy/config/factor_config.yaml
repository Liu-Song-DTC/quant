# ==================== LLM 行业情绪分析 ====================
industry_sentiment:
  enabled: true
  data_dir: "data/sentiment_data"
  deepseek_api_key: ""
  analysis_frequency: "daily"
  max_news_batch: 50
  notify_on_completion: true
  weight_impact:
    enabled: true
    max_multiplier: 1.10
    min_multiplier: 0.90
    smoothing_halflife: 5
    smoothing_method: ema
    regime_adjustment: true
    negativity_bias: 1.2
  backtest:
    precomputed_file: ""

indicator_params:
  ema_periods:
  - 5
  - 10
  - 20
  - 60
  ma_periods:
  - 5
  - 10
  - 20
  - 30
  - 60
  rsi_periods:
  - 6
  - 8
  - 10
  - 14
  bb_window: 20
  bb_std: 2
  momentum_periods:
  - 3
  - 5
  - 10
  - 20
  - 30
  volatility_periods:
  - 5
  - 10
  - 20
  atr_periods:
  - 10
  - 14
  - 20
  volume_ma_period: 20
signal:
  # === 小说优化：确定性优先，宁缺毋滥 ===
  buy_threshold: 0.5
  sell_threshold: -0.15
regime_multiplier:
  bull: 1.0
  neutral: 0.9
  bear: 0.40
portfolio:
  target_volatility: 0.25
  # === 小说优化：分批进出，不一把梭 ===
  # 核心逻辑："越涨越卖，越跌越买，分批操作"
  # 每次调仓只执行50%的目标仓位变化，分两次完成
  entry_speed: 0.5
  exit_speed: 0.5
  # === 小说优化：7%铁律止损（亏损10%需赚20%回本）===
  position_stop_loss: 0.07
  portfolio_stop_loss: 0.12
  max_single_weight: 0.30
  # === 小说优化：动态最小持仓 ===
  # 熊市/弱势允许空仓（"不会空仓的人永远长不大"）
  # 牛市至少持有2只（"龙头洁癖"也不降标准）
  dynamic_min_positions:
    bull: 2
    neutral: 1
    bear: 0
  # === 小说优化：绝对质量门槛 ===
  # 核心逻辑："龙头洁癖"——不仅要比别人好，还要自己够格
  # rank_pct<min_rank 直接淘汰，score<min_score 即使排名够也不选
  selection:
    min_rank_pct: 0.3        # 截面相对排名（放宽：top 70%）
    min_absolute_score: 0.08  # 绝对分数门槛（放宽）
    min_confidence: 0.70      # 信心分数门槛（放宽）
  fv_exposure_params:
    fv_low: -0.01
    fv_high: 0.02
    exposure_min: 0.6
    exposure_max: 1.0
  turnover_bonus: 0.05
portfolio_stop_loss:
  enabled: true
  emergency_exposure: 0.50
volatility_control:
  enabled: true
  lookback_period: 20
# === 因子中性化 ===
factor_neutralization:
  enabled: true
  neutralize_industry: true
  neutralize_market_cap: true
  min_samples_per_industry: 3
# === 增强止损（小说优化：更严格的时间+移动止损）===
enhanced_stop_loss:
  # 小说：持仓超20天无收益就离场
  time_stop_days: 20
  time_stop_min_return: -0.05
  # 小说：控制回撤，移动止损从高点回撤12%即离场
  trailing_stop_pct: 0.12
  trailing_stop_enabled: true
  volatility_adaptive_mult: 1.5
# === 风险平价 ===
risk_parity:
  enabled: true
  target_risk_per_stock: 0.10
  max_iterations: 50
# === 小说优化：动态调仓周期 ===
# 核心逻辑：牛市"捂股不动"延长周期，熊市"快进快出"缩短周期
dynamic_rebalance:
  enabled: true
  bull_period: 30       # 牛市长持，减少换手
  neutral_period: 20    # 中性保持默认
  bear_period: 15       # 熊市灵活，快进快出
# === 缠论优化：背离检测 + 结构分析 ===
# 核心来源：缠中说禅 + 股神：5万本金悟道 + 股道人生
# MACD顶/底背离 → 买卖时机，中枢/级别 → 趋势确认，中阴 → 防假突破
chan_theory:
  enabled: true
  # 背离检测参数
  divergence:
    enabled: true
    lookback: 20                # 背离检测回看窗口
    peak_trough_lookback: 5     # 局部极值检测半径
    strength_threshold: 0.3     # 最小背离强度（0-1）
    verify_trend: true          # "没有趋势，没有背驰" — 验证趋势结构
  # 中枢/结构分析参数
  structure:
    enabled: true
    pivot_min_overlap: 3        # 中枢最少K线重叠数
    pivot_zone_buffer: 0.02     # 中枢边界缓冲
    min_trend_bars: 8           # 趋势确认最少K线数
    zhongyin_threshold: 0.02    # EMA间距阈值（中阴判定）
  # 信号增强参数
  signal_boost:
    bottom_divergence_mult: 1.25     # 底背离买入信号增强
    top_divergence_mult: 0.70        # 顶背离买入信号抑制
    alignment_boost: 0.10            # 多级别对齐额外加分
    zhongyin_penalty: 0.85           # 中阴状态信号惩罚
    pivot_breakout_buy_mult: 1.15    # 中枢突破买入乘数（3买）
    pivot_breakout_sell_mult: 0.75   # 中枢跌破卖出乘数（3卖）
  # 退出增强参数
  exit:
    top_divergence_exit: 0.4         # 顶背离退出强度阈值
    trend_exhaustion_exit: -0.4      # 趋势耗尽退出阈值
    buy_zone_stop_protection: 2.0    # 底背离买入点止损放宽倍数
    volume_divergence_exit: true     # 启用量价背离退出
# === 股票池配置 ===
stock_pool:
  enabled: true            # true=1000只(剔除科创板), false=全市场
  size: 1000
  source: "CSI800(剔除科创板) + CSI1000补足1000"

backtest:
  cash: 150000.0
  commission: 0.0015
  slippage: 0.0015
  rebalance_days: 20
  num_workers: 4
