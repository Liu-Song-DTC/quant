# 策略配置文件
# 结构：因子层 -> 信号层 -> 组合层 -> 回测层

# ============================================
# 1. 因子层 (Factor Layer)
# ============================================

# 因子模式: dynamic / fixed / both
# dynamic:  只用动态因子
# fixed:    只用静态行业因子
# both:     动态优先，失败fallback到静态
factor_mode: fixed   # 先优化信号层，稳定后再启用动态因子

# --- 1.1 动态因子 (第一层) ---
# 注意: 是否启用由 factor_mode 决定（dynamic/both启用，fixed禁用）
# === 过拟合优化：适度收紧阈值，平衡稳定性与收益 ===
dynamic_factor:
  train_window_days: 240           # 训练窗口约10个月（平衡稳定性和响应性）
  forward_period: 20              # 计算future_ret的周期
  top_n_factors: 2                 # 2因子IC最高（4.85%），且更稳定
  min_train_samples: 80            # 最少训练样本数
  min_ic_dates: 20                 # 最少IC天数（适度提高）
  ic_decay_factor: 0.92            # 减少对近期IC的依赖
  fallback_to_static: true         # 动态失败时fallback到静态因子（静态因子对某些行业IC为正）
  # === 阶段1优化：消除1F负IC问题 ===
  min_factor_count: 2              # 最少因子数量
  min_ic_1f: 0.15                  # 1因子最低IC门槛

# --- 回测因子配置 ---
# 预计算和IC验证只使用这里定义的因子（统一配置）
backtest_factors:
  - trend_mom_v41      # 趋势动量（IC 8%+）
  - trend_mom_v24
  - trend_mom_v46
  - mom_x_lowvol_20_20  # 动量×低波动
  - mom_x_lowvol_20_10
  - mom_x_lowvol_10_20
  - mom_x_lowvol_10_10
  - mom_diff_5_20      # 动量差异
  - mom_diff_10_20
  - rsi_factor         # RSI因子
  - volatility         # 波动率
  - volume_ratio       # 成交量
  - bb_width_20        # 布林带宽度
  - fund_score         # 基本面
  - fund_profit_growth
  - fund_revenue_growth
  - fund_roe
  - fund_cf_to_profit
  - fund_gross_margin
  - V41_RSI_915        # 组合因子
  - tech_fund_combo
  # === 新增复合因子 ===
  - rsi_vol_combo      # RSI+波动率组合
  - bb_rsi_combo       # 布林带+RSI组合
  - ret_vol_ratio_10   # 收益波动率比(10日)
  - ret_vol_ratio_20   # 收益波动率比(20日)
  - momentum_reversal  # 动量反转
  - momentum_acceleration  # 动量加速度

# --- 1.2 静态行业因子 (第二层) ---
industry_factor_config:
  lookback_days: 120               # 离线标定时的回看窗口
  forward_period: 20               # 离线标定时的forward窗口

# 静态行业因子列表（离线标定结果 - 2026-04-21）
# 使用优化版标定脚本，基于110万条因子数据
# 按行业+市场状态分类标定最优因子组合
# IC为每日截面IC的平均值
industry_factors:
  互联网/软件:
    factors: [volatility]
    bull_factors: [volatility, mom_x_lowvol_10_20, mom_x_lowvol_10_10]  # IC=12.93%
    bear_factors: [fund_roe]  # IC=9.92%
  交运:
    factors: [tech_fund_combo]  # IC=4.77% (neutral)
    bull_factors: [volatility]  # IC=7.32%
    bear_factors: [bb_rsi_combo, bb_width_20]  # IC=11.54%
  军工:
    factors: [fund_profit_growth, fund_roe]  # IC=8.55% (neutral)
    bull_factors: [mom_x_lowvol_10_20]  # IC=12.96%
    bear_factors: [rsi_vol_combo]  # IC=8.24%
  化工:
    factors: [mom_x_lowvol_10_10, mom_x_lowvol_20_10]  # IC=5.86% (neutral)
    bull_factors: [fund_profit_growth]  # IC=5.05%
    bear_factors: [fund_profit_growth, bb_rsi_combo]  # IC=6.10%
  半导体/光伏:
    factors: [fund_gross_margin, fund_score]  # IC=5.49% (neutral)
    bull_factors: [volatility]  # IC=7.84%
    bear_factors: [bb_rsi_combo, rsi_vol_combo, bb_width_20]  # IC=11.27%
  基建/地产/石油石化:
    factors: [fund_roe, fund_score]  # IC=9.03% (neutral)
    bull_factors: [fund_profit_growth, mom_x_lowvol_20_20, mom_x_lowvol_10_20]  # IC=9.18%
    bear_factors: [fund_roe, bb_width_20, bb_rsi_combo]  # IC=6.79%
  新能源车/风电:
    factors: [fund_profit_growth, tech_fund_combo]  # IC=9.04% (neutral)
    bull_factors: [volatility, mom_x_lowvol_20_20, mom_x_lowvol_10_20]  # IC=8.78%
    bear_factors: [fund_profit_growth]  # IC=8.22%
  有色/钢铁/煤炭/建材:
    factors: [mom_x_lowvol_10_20]  # IC=6.33% (neutral)
    bull_factors: [volatility, mom_x_lowvol_10_10]  # IC=11.56%
    bear_factors: [fund_profit_growth, fund_roe, tech_fund_combo]  # IC=5.21%
  消费/传媒/农业/环保/医药:
    factors: [tech_fund_combo]  # IC=6.72% (neutral)
    bull_factors: [tech_fund_combo, mom_x_lowvol_10_10]  # IC=3.40%
    bear_factors: [bb_width_20]  # IC=7.21%
  电力设备:
    factors: [tech_fund_combo]  # IC=8.11% (neutral)
    bull_factors: [tech_fund_combo]  # IC=7.92%
    bear_factors: [bb_rsi_combo]  # IC=8.23%
  电子:
    factors: [fund_score, fund_roe]  # IC=4.64% (neutral)
    bull_factors: [fund_revenue_growth, tech_fund_combo]  # IC=7.01%
    bear_factors: [fund_profit_growth]  # IC=7.34%
  自动化/制造:
    factors: [fund_profit_growth, tech_fund_combo, fund_score]  # IC=8.75% (neutral)
    bull_factors: [fund_score]  # IC=8.55%
    bear_factors: [bb_rsi_combo, rsi_vol_combo]  # IC=8.06%
  通信/计算机:
    factors: [fund_score, tech_fund_combo, fund_roe]  # IC=7.83% (neutral)
    bull_factors: [mom_x_lowvol_10_20]  # IC=8.45%
    bear_factors: [bb_rsi_combo]  # IC=8.09%
  金融:
    factors: [fund_roe]  # IC=8.62% (neutral)
    bull_factors: [mom_x_lowvol_20_20]  # IC=12.34%
    bear_factors: [fund_profit_growth]  # IC=7.77%

# --- 1.3 基础因子 (第三层/fallback) ---
# 自动使用 mom_lowvol 复合因子，无需配置

# --- 共用基础设施：技术指标参数 ---
indicator_params:
  ema_periods: [5, 10, 20, 60]
  ma_periods: [5, 10, 20, 30, 60]
  rsi_periods: [6, 8, 10, 14]
  bb_window: 20
  bb_std: 2
  momentum_periods: [3, 5, 10, 20, 30]
  volatility_periods: [5, 10, 20]
  atr_periods: [10, 14, 20]
  volume_ma_period: 20

# ============================================
# 2. 信号层 (Signal Layer)
# ============================================
signal:
  buy_threshold: 0.50    # 提高到0.5以过滤弱信号（理论分析：提高胜率）
  sell_threshold: -0.15

# 市场状态乘数
regime_multiplier:
  bull: 1.0
  neutral: 0.7
  bear: 0.3

# ============================================
# 3. 组合层 (Portfolio Layer)
# ============================================
portfolio:
  max_position: 15          # 增加持仓数量以分散风险
  target_volatility: 0.15   # 降低目标波动率以提升Sharpe
  entry_speed: 1.0
  exit_speed: 1.0
  position_stop_loss: 0.12  # 收紧止损
  portfolio_stop_loss: 0.08
  max_single_weight: 0.10   # 降低单只股票最大权重

portfolio_stop_loss:
  enabled: true
  emergency_exposure: 0.30

volatility_control:
  enabled: true
  lookback_period: 20

# ============================================
# 4. 回测配置
# ============================================
backtest:
  cash: 100000.0
  commission: 0.0015
  slippage: 0.0015
  rebalance_days: 20   # 与forward_period对齐
  max_position: 10
