industry_sentiment:
  enabled: true
  data_dir: data/sentiment_data
  deepseek_api_key: ${DEEPSEEK_API_KEY}
  analysis_frequency: daily
  max_news_batch: 50
  notify_on_completion: true
  weight_impact:
    enabled: true
    max_multiplier: 1.1
    min_multiplier: 0.9
    smoothing_halflife: 5
    smoothing_method: ema
    regime_adjustment: true
    negativity_bias: 1.2
  backtest:
    precomputed_file: ''
indicator_params:
  ema_periods:
  - 5
  - 10
  - 20
  - 60
  ma_periods:
  - 5
  - 10
  - 20
  - 30
  - 60
  rsi_periods:
  - 6
  - 8
  - 10
  - 14
  bb_window: 20
  bb_std: 2
  momentum_periods:
  - 3
  - 5
  - 10
  - 20
  - 30
  volatility_periods:
  - 5
  - 10
  - 20
  atr_periods:
  - 10
  - 14
  - 20
  volume_ma_period: 20
signal:
  buy_threshold: 0.12
  sell_threshold: -0.2
  buy_threshold_pct: 0.45
  # 卖出趋势保护（避免趋势中途虚假卖出）
  trend_sell_threshold_strong: -0.15   # MA20>MA60多头排列时的卖出阈值
  trend_sell_threshold_weak: -0.10     # 仅price>MA20时的卖出阈值
  trend_sell_ti_threshold: 0.05        # ti超过此值进一步放宽卖出阈值
  trend_sell_ti_relax: -0.20           # ti强劲时的卖出阈值
regime_multiplier:
  bull: 1.0
  neutral: 0.95
  bear: 0.9
portfolio:
  target_volatility: 0.18
  entry_speed: 0.8
  exit_speed: 1.0
  position_stop_loss: 0.15
  portfolio_stop_loss: 0.18
  dynamic_min_positions:
    bull: 3
    neutral: 2
    bear: 1
  selection:
    min_rank_pct: 0.6
    min_absolute_score: 0.1
    min_confidence: 0.7
    chan_gate_enabled: true
    chan_gate_min_count: 2
    chan_fallback_score: 0.4
    exhaustion_max_weight: 0.05
    exhaustion_reduce_mult: 0.6
    industry_max_weight: 0.35
    rank_weight_cap: 0.18
  fv_exposure_params:
    fv_low: -0.02
    fv_high: 0.03
    exposure_min: 0.25
    exposure_max: 1.0
  turnover_bonus: 0.02
  # === 组合调参区 (从硬编码迁移到YAML) ===
  params:
    max_positions: 8
    risk_parity_min_weight_ratio: 0.5     # min_weight = ratio / n
    rank_decay: 0.3                       # 排名权重衰减 1.0→0.7
    # 市场仓位地板/天花板
    bull_market_floor: 0.85
    bull_market_ceiling: 1.0
    bear_market_floor: 0.30
    bear_market_ceiling: 0.55
    # Chan候选加分
    chan_bonus_sl2: 0.04                  # signal_level>=2
    chan_bonus_buy_point: 0.02            # buy_point>0
    chan_bonus_trend2: 0.01               # trend_type==2
    # 高位追涨惩罚(乘法)
    mom_60d_fomo_threshold: 0.30          # 超过此值大幅降权
    mom_60d_fomo_mult: 0.30
    mom_60d_warn_threshold: 0.20          # 温和惩罚
    mom_60d_warn_mult: 0.65
    dist_ma60_extended_threshold: 0.30
    dist_ma60_extended_mult: 0.40
    # 加法调整
    isolated_b3_penalty: -0.08            # 孤立B3扣分
    industry_pharma_penalty: -0.05        # 医药
    industry_chem_penalty: -0.03          # 化工
    sideways_bonus: 0.03                  # 横盘(mom≈0)加分
    oversold_bonus: 0.04                  # 超跌(dist_ma60<-0.05)
    vol_expand_bonus: 0.03                # 波动扩张(>1.3x)
    vol_contract_penalty: -0.03           # 波动收缩(<0.7x)
    dd20_sharp_bonus: 0.04                # 深度回调<-12%
    dd20_moderate_bonus: 0.02             # 中度回调<-6%
    b3_vol_mild_penalty: -0.03            # B3缩量-0.05~-0.20
    b3_vol_severe_penalty: -0.06          # B3缩量-0.20~-0.30
    # 力竭/反转风险
    exhaustion_high_threshold: 0.30
    exhaustion_moderate_threshold: 0.15
    # 板块轮动
    sector_momentum_weight: 0.40
    sector_signal_density_weight: 0.60
portfolio_stop_loss:
  enabled: true
  emergency_exposure: 0.5
volatility_control:
  enabled: true
  lookback_period: 20
  long_lookback_period: 60
