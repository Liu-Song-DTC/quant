  dynamic_min_positions:
    bull: 2
    neutral: 1
    bear: 0
  selection:
    min_rank_pct: 0.4
    min_absolute_score: 0.3
    min_confidence: 0.3
    chan_gate_enabled: true            # Chan买点门控: 开启后必须有Chan信号才能入选
    chan_gate_min_count: 3             # Chan信号少于此时启用因子fallback
    chan_fallback_score: 0.5           # fallback时纯因子的最低评分
    exhaustion_max_weight: 0.03        # 力竭风险股票的仓位上限
    exhaustion_reduce_mult: 0.5        # 力竭时仓位乘数
    industry_max_weight: 0.20          # 单行业总权重上限
    max_single_weight: 0.12
  fv_exposure_params:
    fv_low: -0.01
    fv_high: 0.02
    exposure_min: 0.4
    exposure_max: 1.0
  turnover_bonus: 0.05
portfolio_stop_loss:
  enabled: true
  emergency_exposure: 0.3
volatility_control:
  enabled: true
  lookback_period: 20
  long_lookback_period: 60
  blend_weight: 0.6
factor_neutralization:
