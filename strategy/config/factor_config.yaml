  trailing_stop_pct: 0.08
  trailing_stop_enabled: true
  volatility_adaptive_mult: 1.5
risk_parity:
  enabled: false
  target_risk_per_stock: 0.1
  max_iterations: 50
dynamic_rebalance:
  enabled: true
  bull_period: 15
  neutral_period: 20
  bear_period: 20
chan_theory:
  enabled: true
  divergence:
    enabled: true
    lookback: 20
    peak_trough_lookback: 5
    strength_threshold: 0.3
    bottom_div_threshold: 0.3
    top_div_threshold: 0.3
    verify_trend: true
  structure:
    enabled: true
    pivot_min_overlap: 3
    pivot_zone_buffer: 0.02
    min_trend_bars: 8
    zhongyin_threshold: 0.02
  signal_boost:
    bottom_divergence_mult: 1.25
    top_divergence_mult: 0.7
    alignment_boost: 0.1
    zhongyin_penalty: 0.85
    pivot_breakout_buy_mult: 1.15
    pivot_breakout_sell_mult: 0.75
  exit:
    top_divergence_exit: 0.3
    trend_exhaustion_exit: -0.3
    buy_zone_stop_protection: 1.5
    volume_divergence_exit: true
  take_profit:
    enabled: true
    s1_reduce_pct: 1.0
    s2_reduce_pct: 0.5
    s3_reduce_pct: 1.0
    pivot_trailing_enabled: true
    profit_lock_pct: 0.15
    bi_sell_exit: true
chan_theory_enhanced:
  enabled: true
  stroke:
    min_stroke_bars: 4
  segment:
    min_strokes: 3
  pivot:
    min_segments: 3
    overlap_required: true
  buy_sell_points:
    b1_buy_mult: 1.3
    b2_buy_mult: 1.2
    b3_buy_mult: 1.25
    s1_sell_mult: 0.6
    s2_sell_mult: 0.65
    s3_sell_mult: 0.7
  signal:
    trend_trend_follow: 1.08
    trend_counter_trend: 0.92
    consolidation_discount: 0.7
    zhongyin_penalty: 0.85
    pivot_bottom_boost: 1.1
  # B3 五层过滤体系 (提高三买准确率)
  b3_filter:
    enabled: true
    # Layer 0: 硬门控 (三条件至少满足两个)
    gate_min_conditions: 2                  # 需要至少满足的条件数
    gate_vol_breakout_min: 1.3              # 条件1: 突破放量 ≥ 1.3x 均量
    gate_vol_pullback_max: 0.85             # 条件1: 回调缩量 ≤ 0.85x 突破量
    gate_confirm_require_trend_or_div: true # 条件2: 趋势确认 或 背离 或 底分型
    gate_shallow_min: 0.5                   # 条件3: 回调浅度 ≥ 0.5
    # Layer 1: 大盘环境
    bear_require_anti_market_strength: 0.3
    bear_require_first_pivot: true
    neutral_require_strong_sector: true
    # Layer 2: 趋势结构 (中枢"段位")
    first_pivot_mult: 1.0
    second_pivot_mult: 0.85
    third_plus_pivot_mult: 0.6
    unconfirmed_trend_mult: 0.7
    # Layer 3: 背离共振
    bottom_div_threshold: 0.3
    fx_quality_min: 0.25
    fx_vol_ratio_min: 1.2
    # Layer 4: 量能确认 (量在价先)
    vol_breakout_min_ratio: 1.5
    vol_pullback_max_ratio: 0.7
    vol_strong_breakout_ratio: 2.0
    vol_strong_pullback_ratio: 0.5
    vol_marginal_pass_ratio: 1.0
    # Layer 5: 回调质量
    shallow_pullback_threshold: 0.8
    normal_pullback_threshold: 0.6
    deep_pullback_threshold: 0.35
    # ZG 硬止损
    zg_hard_stop_enabled: true
    zg_hard_stop_threshold: 0.995
