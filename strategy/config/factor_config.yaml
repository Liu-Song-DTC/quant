# 策略配置文件
# 结构：因子层 -> 信号层 -> 组合层 -> 回测层

# ============================================
# 1. 因子层 (Factor Layer)
# ============================================

# 因子模式: dynamic / fixed / both
# dynamic:  只用动态因子
# fixed:    只用静态行业因子
# both:     动态优先，失败fallback到静态
factor_mode: fixed   # 先优化信号层，稳定后再启用动态因子

# --- 1.1 动态因子 (第一层) ---
# 注意: 是否启用由 factor_mode 决定（dynamic/both启用，fixed禁用）
# === 过拟合优化：适度收紧阈值，平衡稳定性与收益 ===
dynamic_factor:
  train_window_days: 240           # 训练窗口约10个月（平衡稳定性和响应性）
  forward_period: 20              # 计算future_ret的周期
  top_n_factors: 2                 # 2因子IC最高（4.85%），且更稳定
  min_train_samples: 80            # 最少训练样本数
  min_ic_dates: 20                 # 最少IC天数（适度提高）
  ic_decay_factor: 0.92            # 减少对近期IC的依赖
  fallback_to_static: true         # 动态失败时fallback到静态因子（静态因子对某些行业IC为正）
  # === 阶段1优化：消除1F负IC问题 ===
  min_factor_count: 2              # 最少因子数量
  min_ic_1f: 0.15                  # 1因子最低IC门槛

# --- 回测因子配置 ---
# 预计算和IC验证只使用这里定义的因子（统一配置）
backtest_factors:
  - trend_mom_v41      # 趋势动量（IC 8%+）
  - trend_mom_v24
  - trend_mom_v46
  - mom_x_lowvol_20_20  # 动量×低波动
  - mom_x_lowvol_20_10
  - mom_x_lowvol_10_20
  - mom_x_lowvol_10_10
  - mom_diff_5_20      # 动量差异
  - mom_diff_10_20
  - rsi_factor         # RSI因子
  - volatility         # 波动率
  - volume_ratio       # 成交量
  - bb_width_20        # 布林带宽度
  - fund_score         # 基本面
  - fund_profit_growth
  - fund_revenue_growth
  - fund_roe
  - fund_cf_to_profit
  - fund_gross_margin
  - V41_RSI_915        # 组合因子
  - tech_fund_combo
  # === 新增复合因子 ===
  - rsi_vol_combo      # RSI+波动率组合
  - bb_rsi_combo       # 布林带+RSI组合
  - ret_vol_ratio_10   # 收益波动率比(10日)
  - ret_vol_ratio_20   # 收益波动率比(20日)
  - momentum_reversal  # 动量反转
  - momentum_acceleration  # 动量加速度

# --- 1.2 静态行业因子 (第二层) ---
industry_factor_config:
  lookback_days: 120               # 离线标定时的回看窗口
  forward_period: 20               # 离线标定时的forward窗口

# 静态行业因子列表（离线标定结果 - 2024-04-13）
# 使用优化版标定脚本，基于110万条因子数据，测试单因子+2/3因子组合
# IC为截面标准化后的均值，IR=IC均值/IC标准差
industry_factors:
  互联网/软件:
    factors: [mom_x_lowvol_10_20, bb_rsi_combo, rsi_vol_combo]  # IC=0.0828, IR=0.28
  交运:
    factors: [bb_rsi_combo, bb_width_20, mom_x_lowvol_10_20]  # IC=0.0593, IR=0.15
  军工:
    factors: [fund_profit_growth, mom_x_lowvol_20_10, bb_rsi_combo]  # IC=0.1053, IR=0.30
  化工:
    factors: [mom_x_lowvol_10_10, momentum_reversal, fund_score]  # IC=0.0667, IR=0.29
  半导体/光伏:
    factors: [fund_score, fund_gross_margin, momentum_reversal]  # IC=0.0634, IR=0.24
  基建/地产/石油石化:
    factors: [fund_score, momentum_reversal]  # IC=0.0870, IR=0.34
  新能源车/风电:
    factors: [fund_profit_growth, fund_score, momentum_reversal]  # IC=0.0849, IR=0.41
  有色/钢铁/煤炭/建材:
    factors: [mom_x_lowvol_10_10, fund_score, momentum_reversal]  # IC=0.0797, IR=0.37
  消费/传媒/农业/环保/医药:
    factors: [fund_score, bb_width_20, bb_rsi_combo]  # IC=0.0589, IR=0.20
  电力设备:
    factors: [fund_score, mom_x_lowvol_10_20, mom_x_lowvol_10_10]  # IC=0.0850, IR=0.42
  电子:
    factors: [fund_score, fund_revenue_growth, momentum_reversal]  # IC=0.0653, IR=0.32
  自动化/制造:
    factors: [fund_score, mom_x_lowvol_20_20, mom_x_lowvol_10_10]  # IC=0.0830, IR=0.29
  通信/计算机:
    factors: [fund_score, mom_x_lowvol_10_10, mom_x_lowvol_20_20]  # IC=0.0671, IR=0.25
  金融:
    factors: [fund_score, rsi_factor, momentum_reversal]  # IC=0.1021, IR=0.29

# --- 1.3 基础因子 (第三层/fallback) ---
# 自动使用 mom_lowvol 复合因子，无需配置

# --- 共用基础设施：技术指标参数 ---
indicator_params:
  ema_periods: [5, 10, 20, 60]
  ma_periods: [5, 10, 20, 30, 60]
  rsi_periods: [6, 8, 10, 14]
  bb_window: 20
  bb_std: 2
  momentum_periods: [3, 5, 10, 20, 30]
  volatility_periods: [5, 10, 20]
  atr_periods: [10, 14, 20]
  volume_ma_period: 20

# ============================================
# 2. 信号层 (Signal Layer)
# ============================================
signal:
  buy_threshold: 0.50    # 提高到0.5以过滤弱信号（理论分析：提高胜率）
  sell_threshold: -0.15

# 市场状态乘数
regime_multiplier:
  bull: 1.0
  neutral: 0.7
  bear: 0.3

# ============================================
# 3. 组合层 (Portfolio Layer)
# ============================================
portfolio:
  max_position: 10          # 增加持仓数量
  target_volatility: 0.20
  entry_speed: 1.0
  exit_speed: 1.0
  position_stop_loss: 0.15
  portfolio_stop_loss: 0.08
  max_single_weight: 0.15   # 单只股票最大权重15%

portfolio_stop_loss:
  enabled: true
  emergency_exposure: 0.30

volatility_control:
  enabled: true
  lookback_period: 20

# ============================================
# 4. 回测配置
# ============================================
backtest:
  cash: 100000.0
  commission: 0.0015
  slippage: 0.0015
  rebalance_days: 10
  max_position: 10
