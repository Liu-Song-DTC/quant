extreme_adjustments:
  regime_weight: 0.85
fundamental_weights:
  enabled: true
  technical_weight: 0.7
  weight: 0.3
regime_weights:
  bear:
    bb_width: 0.1
    momentum: 0.2
    rsi_average: 0.3
    volatility_10: 0.4
  bull:
    bb_width: 0.1
    momentum: 0.5
    rsi_average: 0.2
    volatility_10: 0.2
  neutral:
    bb_width: 0.15
    momentum: 0.3
    rsi_average: 0.25
    volatility_10: 0.3
signal_thresholds:
  adjusted_buy: 0.05
  buy: 0.15
  sell: -0.05
technical_weights:
  bb_width: 0.2
  momentum: 0.3
  rsi_average: 0.3
  volatility_10: 0.2

# 组合仓位管理配置
portfolio:
  max_position: 10
  target_volatility: 0.20
  entry_speed: 1.0
  exit_speed: 1.0
  position_stop_loss: 0.10
  portfolio_stop_loss: 0.08

# 组合止损配置
portfolio_stop_loss:
  enabled: false
  emergency_exposure: 0.30

volatility_control:
  enabled: false
  lookback_period: 20
  target_volatility: 0.2

# 行业因子配置（基于分行业验证结果）
# 使用方法: 从 core/industry_factor_config.py 加载配置
industry_factor_config:
  enabled: true
  lookback_days: 120  # 滚动验证回看期
  forward_days: 20     # 滚动验证展望期（与调仓周期一致）

# 动态因子选择配置（Walk-Forward动态选择）
# 启用后，每个验证时点基于训练窗口内的IC/IR选择Top-N因子
dynamic_factor:
  enabled: false
  train_window: 250       # 训练窗口天数
  forward_period: 20       # 前瞻期（与调仓周期一致）
  top_n_factors: 3        # 选择Top-N因子
  min_train_samples: 50    # 最少训练样本数
  min_ic_dates: 5         # 最少有效IC天数

# 技术指标参数
indicator_params:
  # EMA周期
  ema_periods: [5, 10, 20, 60]
  # MA周期
  ma_periods: [5, 10, 20, 30, 60]
  # RSI周期
  rsi_periods: [6, 8, 10, 14]
  # 布林带参数
  bb_window: 20
  bb_std: 2
  # 动量周期
  momentum_periods: [3, 5, 10, 20, 30]
  # 波动率周期
  volatility_periods: [5, 10, 20]
  # ATR周期
  atr_periods: [10, 14, 20]
  # 成交量MA周期
  volume_ma_period: 20
