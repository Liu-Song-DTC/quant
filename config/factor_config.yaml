# 因子配置 - 用于量化交易策略的因子权重管理
# 当前使用默认值，与原有代码保持一致

# 技术面因子权重 (默认) - 平衡版
# 提高RSI权重: 0.25 → 0.30 (超买超卖更适合牛市)
# 保持动量权重: 0.30
technical_weights:
  volatility_10: 0.20
  rsi_average: 0.30
  bb_width: 0.20
  momentum: 0.30

# 信号阈值
signal_thresholds:
  buy: 0.15        # 默认买入阈值
  adjusted_buy: 0.05
  sell: -0.05

# 极端状态调整 (默认) - 与原代码保持一致
extreme_adjustments:
  regime_weight: 0.85

# 基本面因子权重 (新增)
fundamental_weights:
  enabled: true
  weight: 0.30  # 基本面权重30%，技术面70%
  technical_weight: 0.70

# 市场状态动态权重
regime_weights:
  bull:
    volatility_10: 0.20
    rsi_average: 0.20
    bb_width: 0.10
    momentum: 0.50
  bear:
    volatility_10: 0.40
    rsi_average: 0.30
    bb_width: 0.10
    momentum: 0.20
  neutral:
    volatility_10: 0.30
    rsi_average: 0.25
    bb_width: 0.15
    momentum: 0.30

# 波动率控制 (默认关闭)
volatility_control:
  enabled: false
  target_volatility: 0.20
  lookback_period: 20

# 组合止损 (默认关闭)
portfolio_stop_loss:
  enabled: false
  drawdown_threshold: 0.08  # 从高点回撤8%触发
  emergency_exposure: 0.30  # 触发后仓位上限

# 风格因子权重 (新增) - 用于大小盘/价值成长轮动
style_weights:
  enabled: true
  weight: 0.25  # 风格因子权重提升到25%
  # 风格轮动参数
  style_rotation:
    small_cap_threshold: 0.03  # 小盘偏好阈值
    large_cap_threshold: -0.03  # 大盘偏好阈值
    confidence_threshold: 0.3  # 风格置信度阈值
    momentum_boost: 1.5  # 牛市风格动量增强系数

# 回测参数配置
backtest:
  cash: 100000.0            # 初始资金
  commission: 0.0015        # 佣金费率
  slippage: 0.0015          # 滑点
  max_position: 10          # 最大持仓股票数
  rebalance_days: 20        # 调仓周期(天)
  num_workers: 8            # 并行进程数

# 组合配置
portfolio:
  max_position: 10          # 最大持仓股票数
  target_volatility: 0.20   # 目标波动率
  entry_speed: 1.0          # 建仓速度 (1.0=一次性建仓)
  exit_speed: 1.0           # 平仓速度 (1.0=一次性平仓)
  position_stop_loss: 0.10   # 个股止损线
  portfolio_stop_loss: 0.08 # 组合止损线(回撤)

# 数据路径
paths:
  data: "../data/stock_data/backtrader_data/"
  fundamental: "../data/stock_data/fundamental_data/"

# 行业分类映射 - 将相近行业归类
