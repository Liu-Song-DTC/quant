# 策略配置文件
# 结构：因子层 -> 信号层 -> 组合层 -> 回测层

# ============================================
# 1. 因子层 (Factor Layer)
# ============================================

# 因子模式: dynamic / fixed / both
# dynamic:  只用动态因子
# fixed:    只用静态行业因子
# both:     动态优先，失败fallback到静态
factor_mode: both   # 动态优先，失败fallback到静态

# --- 1.1 动态因子 (第一层) ---
# 注意: 是否启用由 factor_mode 决定（dynamic/both启用，fixed禁用）
dynamic_factor:
  train_window_days: 120           # IC训练窗口（天数）- 约4个月
  forward_period: 20              # 计算future_ret的周期
  top_n_factors: 3                 # 每个行业选几个因子
  min_train_samples: 50            # 最少训练样本数
  min_ic_dates: 10                 # 最少IC天数（增加以提高稳定性）
  ic_decay_factor: 0.8           # IC时序衰减因子（1.0=不衰减，0.9/0.8=指数衰减）
  fallback_to_static: true         # 动态失败时fallback到静态
  # === 阶段1优化：消除1F负IC问题 ===
  min_factor_count: 2              # 最少因子数量，1F fallback到静态
  min_ic_1f: 0.10                  # 1因子最低IC门槛（10%）

# --- 回测因子配置 ---
# 预计算和IC验证只使用这里定义的因子（统一配置）
backtest_factors:
  - trend_mom_v41      # 趋势动量（IC 8%+）
  - trend_mom_v24
  - trend_mom_v46
  - mom_x_lowvol_20_20  # 动量×低波动
  - mom_x_lowvol_20_10
  - mom_x_lowvol_10_20
  - mom_x_lowvol_10_10
  - mom_diff_5_20      # 动量差异
  - mom_diff_10_20
  - rsi_factor         # RSI因子
  - volatility         # 波动率
  - volume_ratio       # 成交量
  - bb_width_20        # 布林带宽度
  - fund_score         # 基本面
  - fund_profit_growth
  - fund_revenue_growth
  - fund_roe
  - fund_cf_to_profit
  - fund_gross_margin
  - V41_RSI_915        # 组合因子
  - tech_fund_combo
  # === 新增复合因子 ===
  - rsi_vol_combo      # RSI+波动率组合
  - bb_rsi_combo       # 布林带+RSI组合
  - ret_vol_ratio_10   # 收益波动率比(10日)
  - ret_vol_ratio_20   # 收益波动率比(20日)
  - momentum_reversal  # 动量反转
  - momentum_acceleration  # 动量加速度

# --- 1.2 静态行业因子 (第二层) ---
industry_factor_config:
  lookback_days: 120               # 离线标定时的回看窗口
  forward_period: 20               # 离线标定时的forward窗口

# 静态行业因子列表（离线标定结果）
industry_factors:
  自动化/制造:
    factors: [fund_revenue_growth, mom_x_lowvol_20_20, mom_x_lowvol_20_10]
  电力设备:
    factors: [fund_score, fund_profit_growth, mom_x_lowvol_20_20]
  基建/地产/石油石化:
    factors: [fund_profit_growth, fund_score, fund_roe]
  金融:
    factors: [fund_cf_to_profit, fund_score, fund_roe]
  化工:
    factors: [fund_profit_growth, fund_revenue_growth, fund_score]
  新能源车/风电:
    factors: [fund_profit_growth, fund_revenue_growth, fund_score]
  有色/钢铁/煤炭/建材:
    factors: [fund_score, fund_revenue_growth, fund_profit_growth]
  军工:
    factors: [mom_x_lowvol_20_20, mom_x_lowvol_20_10, fund_profit_growth]
  互联网/软件:
    factors: [fund_profit_growth, fund_score, fund_revenue_growth]
  电子:
    factors: [mom_x_lowvol_20_20, fund_profit_growth, fund_revenue_growth]
  消费/传媒/农业/环保/医药:
    factors: [fund_revenue_growth, fund_profit_growth, mom_x_lowvol_20_20]
  半导体/光伏:
    factors: [mom_x_lowvol_20_20, fund_revenue_growth, fund_profit_growth]
  交运:
    factors: [fund_profit_growth, fund_gross_margin, mom_x_lowvol_20_20]
  通信/计算机:
    factors: [fund_profit_growth, fund_score, fund_revenue_growth]

# --- 1.3 基础因子 (第三层/fallback) ---
# 自动使用 mom_lowvol 复合因子，无需配置

# --- 共用基础设施：技术指标参数 ---
indicator_params:
  ema_periods: [5, 10, 20, 60]
  ma_periods: [5, 10, 20, 30, 60]
  rsi_periods: [6, 8, 10, 14]
  bb_window: 20
  bb_std: 2
  momentum_periods: [3, 5, 10, 20, 30]
  volatility_periods: [5, 10, 20]
  atr_periods: [10, 14, 20]
  volume_ma_period: 20

# ============================================
# 2. 信号层 (Signal Layer)
# ============================================
signal:
  buy_threshold: 0.18    # 从0.15提高到0.18，提高买入准确率
  sell_threshold: -0.15

# 市场状态乘数
regime_multiplier:
  bull: 1.0
  neutral: 0.7
  bear: 0.3

# ============================================
# 3. 组合层 (Portfolio Layer)
# ============================================
portfolio:
  max_position: 6
  target_volatility: 0.20
  entry_speed: 1.0
  exit_speed: 1.0
  position_stop_loss: 0.15
  portfolio_stop_loss: 0.08

portfolio_stop_loss:
  enabled: true
  emergency_exposure: 0.30

volatility_control:
  enabled: true
  lookback_period: 20

# ============================================
# 4. 回测配置
# ============================================
backtest:
  cash: 100000.0
  commission: 0.0015
  slippage: 0.0015
  rebalance_days: 10
  max_position: 10
