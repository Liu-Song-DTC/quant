industry_sentiment:
  enabled: true
  data_dir: data/sentiment_data
  deepseek_api_key: ${DEEPSEEK_API_KEY}
  analysis_frequency: daily
  max_news_batch: 50
  notify_on_completion: true
  weight_impact:
    enabled: true
    max_multiplier: 1.1
    min_multiplier: 0.9
    smoothing_halflife: 5
    smoothing_method: ema
    regime_adjustment: true
    negativity_bias: 1.2
  backtest:
    precomputed_file: ''
indicator_params:
  ema_periods:
  - 5
  - 10
  - 20
  - 60
  ma_periods:
  - 5
  - 10
  - 20
  - 30
  - 60
  rsi_periods:
  - 6
  - 8
  - 10
  - 14
  bb_window: 20
  bb_std: 2
  momentum_periods:
  - 3
  - 5
  - 10
  - 20
  - 30
  volatility_periods:
  - 5
  - 10
  - 20
  atr_periods:
  - 10
  - 14
  - 20
  volume_ma_period: 20
signal:
  buy_threshold: 0.35
  sell_threshold: -0.40
  buy_threshold_pct: 0.50
  buy_threshold_pct_bull: 0.40
  buy_threshold_pct_bear: 0.60
  resonance:
    sys1_buy_threshold_mult: 0.7
    sys2_cf_score_threshold: 0.5
    sys3_ns_score_threshold: 0.3
    sys2_cf_sell_threshold: 0.35
    sys3_ns_sell_threshold: 0.2
  factor_quality_gate:
    enabled: true
    banned_suffixes:
    - _T
    - _SM
    restricted_suffixes:
      _FBA: 1.30
      _FV: 1.30
      _F: 1.30
    premium_suffixes:
      _FLA: 1.0
      _FGR: 1.0
      _FGRV: 1.0
      _FLAV: 1.0
      _FSM: 1.0
      _FD: 1.0
      _LA: 1.0
  ti_boost_scale: 2.0
  ti_boost_magnitude: 0.12
  ti_adaptive_scale: 0.3
  ti_adaptive_max_adjust: 0.12
  signal_confidence_baseline: 0.2
  trend_sell_threshold_strong: -0.18
  trend_sell_threshold_weak: -0.13
  trend_sell_ti_threshold: 0.05
  trend_sell_ti_relax: -0.25
regime_multiplier:
  bull: 1.0
  neutral: 0.95
  bear: 0.9
portfolio:
  target_volatility: 0.25
  entry_speed: 0.6
  exit_speed: 0.6
  position_stop_loss: 0.10
  portfolio_stop_loss: 0.10
  dynamic_min_positions:
    bull: 3
    neutral: 2
    bear: 1
  selection:
    min_rank_pct: 0.70
    min_absolute_score: 0.15
    min_confidence: 0.80
    chan_gate_enabled: true
    chan_gate_min_count: 2
    chan_fallback_score: 0.4
    exhaustion_max_weight: 0.08
    exhaustion_reduce_mult: 0.5
    industry_max_weight: 0.40
    rank_weight_cap: 0.35
    speculative_max_weight: 0.40
  fv_exposure_params:
    fv_low: -0.02
    fv_high: 0.03
    exposure_min: 0.25
    exposure_max: 1.0
  turnover_bonus: 0.1
  params:
    max_positions: 4
    risk_parity_min_weight_ratio: 0.5
    rank_decay: 0.3
    bull_market_floor: 0.85
    bull_market_ceiling: 1.0
    bear_market_floor: 0.25
    bear_market_ceiling: 0.50
    chan_bonus_sl2: 0.04
    chan_bonus_buy_point: 0.02
    chan_bonus_trend2: 0.01
    mom_60d_fomo_threshold: 0.3
    mom_60d_fomo_mult: 0.40
    mom_60d_warn_threshold: 0.2
    mom_60d_warn_mult: 0.65
    dist_ma60_extended_threshold: 0.3
    dist_ma60_extended_mult: 0.4
    isolated_b3_penalty: -0.08
    b3_vol_severe_penalty: -0.06
    exhaustion_high_threshold: 0.3
    exhaustion_moderate_threshold: 0.15
    mr_exit_cooldown_days: 14
    ideal_position_max_mult: 2.0
    min_hold_days: 15
    sector_momentum_weight: 0.4
    sector_signal_density_weight: 0.6
portfolio_stop_loss:
  enabled: true
  emergency_exposure: 0.5
# === 硬最大回撤停止：回撤超阈值→清仓→恢复后才允许重新交易 ===
hard_drawdown_stop:
  enabled: true
  trigger_drawdown: 0.20        # 20%回撤触发硬停止
  recovery_threshold: 0.10      # 回撤<10%才恢复
  close_positions_days: 3       # 3天内线性清仓
# === 连续亏损熔断：连亏N个调仓周期→减半敞口→连盈后恢复 ===
consecutive_loss_breaker:
  enabled: true
  threshold: 3                  # 连亏3个周期触发
  loss_floor: -0.005            # -0.5%以下算"亏损周期"
  win_floor: 0.005              # +0.5%以上算"盈利周期"
  exposure_reduction: 0.50      # 触发后敞口减半
  reset_after_win: 2            # 连盈2个周期后恢复
volatility_control:
  enabled: true
  lookback_period: 20
  long_lookback_period: 60
  blend_weight: 0.6
factor_neutralization:
  enabled: true
  neutralize_industry: true
  neutralize_market_cap: true
  min_samples_per_industry: 3
enhanced_stop_loss:
  time_stop_days: 15
  time_stop_min_return: -0.03
  trailing_stop_enabled: true
  volatility_adaptive_mult: 1.0
  time_stop_by_buy_point:
    1:
    - 40
    - -0.08
    2:
    - 30
    - -0.05
    3:
    - 15
    - -0.04
  trailing_stop_by_buy_point:
    1: 0.15
    2: 0.12
    3: 0.1
    default: 0.08
mean_reversion_exit:
  mom_60d_force_exit: 0.45
  dist_ma60_force_exit: 0.4
  mom_60d_reduce: 0.3
  dist_ma60_reduce: 0.35
  reduce_pct: 0.3
risk_parity:
  enabled: true
  target_risk_per_stock: 0.1
  max_iterations: 50
dynamic_rebalance:
  enabled: true
  bull_period: 25
  neutral_period: 15
  bear_period: 8
chan_theory:
  enabled: true
  divergence:
    enabled: true
    lookback: 20
    peak_trough_lookback: 5
    strength_threshold: 0.3
    bottom_div_threshold: 0.3
    top_div_threshold: 0.3
    verify_trend: true
  structure:
    enabled: true
    pivot_min_overlap: 3
    pivot_zone_buffer: 0.02
    min_trend_bars: 8
    zhongyin_threshold: 0.02
  signal_boost:
