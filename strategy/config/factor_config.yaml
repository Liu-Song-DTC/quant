    top_divergence_mult: 0.78
    alignment_boost: 0.06
    zhongyin_penalty: 0.9
    pivot_breakout_buy_mult: 1.08
    pivot_breakout_sell_mult: 0.82
  exit:
    top_divergence_exit: 0.3
    trend_exhaustion_exit: -0.3
    buy_zone_stop_protection: 1.5
    volume_divergence_exit: true
  take_profit:
    enabled: true
    s1_reduce_pct: 0.75
    s2_reduce_pct: 0.5
    s3_reduce_pct: 1.0
    pivot_trailing_enabled: true
    profit_lock_pct: 0.2
    bi_sell_exit: true
chan_theory_enhanced:
  enabled: true
  stroke:
    min_stroke_bars: 4
  segment:
    min_strokes: 3
  pivot:
    min_segments: 3
    overlap_required: true
  buy_sell_points:
    b1_buy_mult: 1.2
    b2_buy_mult: 1.12
    b3_buy_mult: 1.15
    s1_sell_mult: 0.75
    s2_sell_mult: 0.78
    s3_sell_mult: 0.82
  signal:
    trend_trend_follow: 1.06
    trend_counter_trend: 0.94
    consolidation_discount: 0.8
    zhongyin_penalty: 0.9
    pivot_bottom_boost: 1.06
  b1_gate:
    min_bottom_div: 0.15
    min_fx_vol_spike: 1.5
  b2_gate:
    min_confidence: 0.3
  b3_filter:
    enabled: true
    gate_min_conditions: 2
    gate_vol_breakout_min: 1.3
    gate_vol_pullback_max: 0.85
    gate_confirm_require_trend_or_div: true
    gate_shallow_min: 0.5
    bear_require_anti_market_strength: 0.3
    bear_require_first_pivot: true
    neutral_require_strong_sector: true
    first_pivot_mult: 1.0
    second_pivot_mult: 0.85
    third_plus_pivot_mult: 0.6
    unconfirmed_trend_mult: 0.7
    bottom_div_threshold: 0.3
    fx_quality_min: 0.25
    fx_vol_ratio_min: 1.2
    vol_breakout_min_ratio: 1.5
    vol_pullback_max_ratio: 0.7
    vol_strong_breakout_ratio: 2.0
    vol_strong_pullback_ratio: 0.5
    vol_marginal_pass_ratio: 1.0
    shallow_pullback_threshold: 0.8
    normal_pullback_threshold: 0.6
    deep_pullback_threshold: 0.35
    zg_hard_stop_enabled: true
    zg_hard_stop_threshold: 0.995
stock_pool:
  enabled: true
  size: 2000
  source: 全市场(除科创板688xxx, 价格>2元, 数据>60日)
ml:
  enabled: true
  model_dir: strategy/models
  blend_weight: 0.55
  retrain_frequency: 20
  n_estimators: 200
  max_depth: 4
  learning_rate: 0.05
  subsample: 0.7
  colsample_bytree: 0.6
  reg_lambda: 2.0
  reg_alpha: 1.0
  min_child_weight: 5
  use_cross_features: true
  use_regime_features: true
multi_timeframe:
  enabled: true
  weekly_ema_fast: 20
  weekly_ema_slow: 60
  monthly_ema_fast: 5
  monthly_ema_slow: 15
  min_weekly_bars: 12
  min_monthly_bars: 8
  min_daily_bars: 60
  discount:
    counter_trend: 0.5
    partial: 0.72
    full: 1.0
    weak_trend: 0.95
    blend_strength: 0.4
  pattern:
    weight: 0.15
  structure:
    enabled: true
    pivot_lookback: 5
backtest:
  cash: 150000.0
  commission: 0.0005
  slippage: 0.0003
  stamp_tax: 0.0005
  rebalance_days: 15
  num_workers: 4
  fromdate: '2024-01-01'
  todate: '2026-05-30'
# === T+1结算 + 冲击成本模型 ===
cost_model:
  t_plus_1_enabled: true
  impact_cost_enabled: true
  impact_cost_base: 0.0003       # 0.03% 基础冲击(每1%ADV交易量)
  impact_cost_exponent: 0.5      # sqrt(参与率)缩放
  min_impact_cost: 0.00005       # 最低冲击成本
  adv_lookback: 20               # 日均量计算窗口
# === 实盘vs回测监控 ===
live_monitoring:
  enabled: true
  reference_path: "strategy/rolling_validation_results/backtest_reference.csv"
  divergence_threshold: 0.30     # 30%持仓偏离报警
# === 多策略框架 ===
multi_strategy:
  enabled: false
  trend:
    weight: 0.40
    min_chan_signal: 2
  reversion:
    weight: 0.30
    max_exhaustion: 0.30
  defensive:
    weight: 0.30
    max_drawdown_trigger: 0.12
  blending:
    bull_tilt: trend
    bear_tilt: defensive
