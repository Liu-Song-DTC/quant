# 策略配置文件
# 结构：因子层 -> 信号层 -> 组合层 -> 回测层

# ============================================
# 1. 因子层 (Factor Layer)
# ============================================

# 因子模式: dynamic / fixed / both
# dynamic:  只用动态因子
# fixed:    只用静态行业因子
# both:     动态优先，失败fallback到静态
factor_mode: both   # dynamic优先，fallback到static

# --- 1.1 动态因子 (第一层) ---
dynamic_factor:
  enabled: true                    # 是否启用动态因子
  train_window_days: 90            # IC训练窗口（天数）- 约一季度
  sample_interval_days: 3          # 训练窗口内采样间隔（天数）
  forward_period: 20              # 计算future_ret的周期
  top_n_factors: 3                 # 每个行业选几个因子
  min_train_samples: 50            # 最少训练样本数
  min_ic_dates: 10                 # 最少IC天数
  fallback_to_static: true         # 动态失败时fallback到静态

# --- 1.2 静态行业因子 (第二层) ---
industry_factor_config:
  lookback_days: 120               # 离线标定时的回看窗口
  forward_period: 20               # 离线标定时的forward窗口

# 静态行业因子列表（离线标定结果）
industry_factors:
  自动化/制造:
    factors: [fund_revenue_growth, mom_x_lowvol_20_20, mom_x_lowvol_20_10]
  电力设备:
    factors: [fund_score, fund_profit_growth, mom_x_lowvol_20_20]
  基建/地产/石油石化:
    factors: [fund_profit_growth, fund_score, fund_roe]
  金融:
    factors: [fund_cf_to_profit, fund_score, fund_roe]
  化工:
    factors: [mom_x_lowvol_20_20, mom_x_lowvol_20_10, fund_gross_margin]
  新能源车/风电:
    factors: [fund_profit_growth, fund_revenue_growth, fund_score]
  有色/钢铁/煤炭/建材:
    factors: [fund_score, fund_revenue_growth, fund_profit_growth]
  军工:
    factors: [mom_x_lowvol_20_20, mom_x_lowvol_20_10, fund_profit_growth]
  互联网/软件:
    factors: [mom_x_lowvol_20_20, mom_x_lowvol_20_10, fund_roe]
  电子:
    factors: [mom_x_lowvol_20_20, fund_profit_growth, fund_revenue_growth]
  消费/传媒/农业/环保/医药:
    factors: [fund_revenue_growth, fund_profit_growth, mom_x_lowvol_20_20]
  半导体/光伏:
    factors: [mom_x_lowvol_20_20, fund_revenue_growth, fund_profit_growth]
  交运:
    factors: [fund_profit_growth, fund_gross_margin, mom_x_lowvol_20_20]
  通信/计算机:
    factors: [fund_profit_growth, fund_score, fund_revenue_growth]

# --- 1.3 基础因子 (第三层/fallback) ---
# 自动使用 mom_lowvol 复合因子，无需配置

# --- 共用基础设施：技术指标参数 ---
indicator_params:
  ema_periods: [5, 10, 20, 60]
  ma_periods: [5, 10, 20, 30, 60]
  rsi_periods: [6, 8, 10, 14]
  bb_window: 20
  bb_std: 2
  momentum_periods: [3, 5, 10, 20, 30]
  volatility_periods: [5, 10, 20]
  atr_periods: [10, 14, 20]
  volume_ma_period: 20

# ============================================
# 2. 信号层 (Signal Layer)
# ============================================
signal:
  buy_threshold: 0.15
  sell_threshold: -0.15

# 市场状态乘数
regime_multiplier:
  bull: 1.0
  neutral: 0.85
  bear: 0.6

# ============================================
# 3. 组合层 (Portfolio Layer)
# ============================================
portfolio:
  max_position: 10
  target_volatility: 0.25
  entry_speed: 1.0
  exit_speed: 1.0
  position_stop_loss: 0.15
  portfolio_stop_loss: 0.12

portfolio_stop_loss:
  enabled: true
  emergency_exposure: 0.50

volatility_control:
  enabled: true
  lookback_period: 20

# ============================================
# 4. 回测配置
# ============================================
backtest:
  cash: 100000.0
  commission: 0.0015
  slippage: 0.0015
  rebalance_days: 20
