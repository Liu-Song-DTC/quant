    second_pivot_mult: 0.85
    third_plus_pivot_mult: 0.6
    unconfirmed_trend_mult: 0.7
    bottom_div_threshold: 0.3
    fx_quality_min: 0.25
    fx_vol_ratio_min: 1.2
    vol_breakout_min_ratio: 1.5
    vol_pullback_max_ratio: 0.7
    vol_strong_breakout_ratio: 2.0
    vol_strong_pullback_ratio: 0.5
    vol_marginal_pass_ratio: 1.0
    shallow_pullback_threshold: 0.8
    normal_pullback_threshold: 0.6
    deep_pullback_threshold: 0.35
    zg_hard_stop_enabled: true
